server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Cache static assets aggressively (Vite hashes them)
    location ~* \.(?:js|css|woff2?|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache images
    location ~* \.(?:png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Service worker — never cache
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # PWA manifest
    location = /manifest.webmanifest {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Content-Type "application/manifest+json";
    }

    # API proxy (if backend runs alongside)
    # location /api/ {
    #     proxy_pass http://backend:5183/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }

    # SPA fallback — all routes (including /:lang/*) return index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
