server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # nginx listens on :80 behind Coolify's TLS proxy. The default behavior
    # for a directory request without a trailing slash (e.g. /uk) is to
    # emit an absolute 301 to /uk/ using this server's scheme (http://),
    # which Coolify forwards verbatim — producing an https→http→https
    # redirect chain on every prerendered route. Disable absolute redirects
    # so any auto-redirect emitted by nginx is relative and the browser
    # preserves the original scheme.
    absolute_redirect off;
    port_in_redirect off;

    # ── Security headers ─────────────────────────────────────────────────
    # `always` ensures they're sent on error responses too.
    # NB: nginx `add_header` does NOT inherit into child `location` blocks
    # that define their own `add_header` (the cache locations below). HSTS
    # is sticky per host, CSP is enforced from the document response, so
    # missing them on cached JS/CSS/image responses is acceptable.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # CSP allowlist matches what index.html / pages actually load:
    #  • Google tag + GA (analytics)
    #  • Umami at analytics.getpetzone.com
    #  • OpenStreetMap tiles + Leaflet marker assets (unpkg / raw.githubusercontent)
    #  • MinIO presigned URLs are reached via /api/files/.../redirect (same-origin),
    #    so `img-src https:` covers wherever MinIO finally resolves to.
    # `'unsafe-inline'` is required for the JSON-LD blocks (dangerouslySetInnerHTML)
    # and MUI's emotion-generated styles; nonces would need lua/njs in nginx.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://analytics.getpetzone.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.getpetzone.com https://www.google-analytics.com https://analytics.getpetzone.com; frame-src https://www.youtube.com https://www.youtube-nocookie.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Cache static assets aggressively (Vite hashes them)
    location ~* \.(?:js|css|woff2?|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache images
    location ~* \.(?:png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Service worker — never cache
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass ${BACKEND_URL}/;
        proxy_http_version 1.1;
        proxy_set_header Host ${BACKEND_HOST};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Root → permanent redirect to default language (server-side 301, not JS)
    location = / {
        return 301 /uk;
    }

    # SPA fallback: serve prerendered /lang/route/index.html directly when
    # present (no 301 to add a trailing slash — Google and users see one
    # response, both /uk and /uk/ resolve to the same content). Fall back
    # to the root SPA shell for non-prerendered routes. Canonical is set
    # per-page in <head> via prerender + react-helmet.
    location / {
        try_files $uri $uri/index.html /index.html;
    }
}