name: Build & Push Docker Images

on:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend API
    runs-on: ubuntu-latest
    if: |
      contains(toJson(github.event.commits.*.modified), 'backend/') ||
      contains(toJson(github.event.commits.*.added), 'backend/')
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: arey225
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: arey225/petzone-api:latest

  notification:
    name: Notification Service
    runs-on: ubuntu-latest
    if: |
      contains(toJson(github.event.commits.*.modified), 'notification-service/') ||
      contains(toJson(github.event.commits.*.added), 'notification-service/')
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: arey225
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push Notification image
        uses: docker/build-push-action@v5
        with:
          context: ./notification-service
          push: true
          tags: arey225/petzone-notification:latest

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    if: |
      contains(toJson(github.event.commits.*.modified), 'frontend/') ||
      contains(toJson(github.event.commits.*.added), 'frontend/')
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: arey225
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: arey225/petzone-frontend:latest